<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d0d12;
      --panel-bg: rgba(30, 30, 36, 0.8);
      --accent: #e2c044; /* Flint Gold */
      --text: #fdfdfd;
      --text-soft: #a1a1aa;
      --border: rgba(255, 255, 255, 0.06);
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #ui-container {
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      width: 90%;
      max-width: 450px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .brand-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .brand-title span {
      color: var(--accent);
    }

    #status {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .info-box {
      font-size: 0.9rem;
      margin: 20px 0;
      color: var(--text-soft);
      line-height: 1.6;
      text-align: left;
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 12px;
      min-height: 80px;
    }

    .btn-vm {
      background-color: var(--accent);
      color: #000;
      border: none;
      padding: 14px 24px;
      font-weight: 700;
      text-decoration: none;
      display: none;
      border-radius: 12px;
      width: 100%;
      transition: transform 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
    }

    .btn-vm:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .credits {
      margin-top: 25px;
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .loading-pulse {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.5; }
    }
  </style>
</head>
<body>

<div id="ui-container">
  <div class="brand-title">Flint <span></span></div>
  
  <div id="status">
    <div class="loading-pulse"></div>
    Connecting to VM...
  </div>

  <div id="details" class="info-box">
    Requesting a new Ubuntu instance from the cloud provider. This usually takes a few seconds.
  </div>

  <a class="btn-vm" href="#" id="redirect-btn">Access VM Instance</a>

  <div class="credits">Powered by UBX</div>
</div>

<script>
  async function launchVM() {
    const statusText = document.getElementById('status');
    const detailsBox = document.getElementById('details');
    const redirectBtn = document.getElementById('redirect-btn');
    
    try {
      // Re-implementing the original fetch logic from your ubuntuubx.html file
      const response = await fetch('https://ec2-18-219-58-159.us-east-2.compute.amazonaws.com/api/create?developer_id=loremgroupusllc&site_limit=999&delete_after=45');
      const data = await response.json();

      if (data.status === "success") {
        statusText.innerHTML = '<i class="fa-solid fa-check-circle"></i> VM READY';
        detailsBox.innerHTML = `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><strong>Container</strong><br>${data.container_id}</div>
            <div><strong>Port</strong><br>${data.port}</div>
          </div>
          <p style="margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; font-size: 0.8rem;">
            Instance will be deleted in ${data.auto_delete_minutes} minutes.
          </p>
        `;
        
        redirectBtn.href = data.url;
        redirectBtn.style.display = 'block';
        
        // Automatic redirect as found in the original system
        setTimeout(() => { 
            window.location.href = data.url; 
        }, 3000);
        
      } else {
        statusText.style.color = "#ff4444";
        statusText.innerText = "Deployment Failed";
        detailsBox.innerText = "Reason: " + (data.detail || "Unknown error.");
      }
    } catch (error) {
      statusText.style.color = "#ff4444";
      statusText.innerText = "Connection Error";
      detailsBox.innerText = "Unable to reach the provisioning server. Check your connection or API status.";
    }
  }
  
  window.addEventListener('load', launchVM);
</script>

</body>
</html>

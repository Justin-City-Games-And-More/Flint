<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Flint - Games</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #1a1a20;
      --bg-gradient-end: #0d0d12;
      --panel-bg: rgba(30, 30, 36, 0.6);
      --panel-hover: rgba(45, 45, 55, 0.8);
      --text: #fdfdfd;
      --text-soft: #a1a1aa;
      --accent: #e2c044;
      --discord: #5865F2;
      --border-light: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.15);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    html, body {
      height: 100%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; 
  /* ADD THESE THREE LINES */
  background: radial-gradient(circle at top, var(--bg-gradient-start), var(--bg-gradient-end) 80%);
  background-attachment: fixed;
  background-size: cover;
  
  color: var(--text);
  overflow-x: hidden;
  overflow-y: auto;
}

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      padding: 40px;
      border-radius: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow-soft);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-title { font-size: 2rem; margin-bottom: 12px; }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--discord);
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 600;
      margin-top: 20px;
      transition: transform 0.2s;
    }

    .discord-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .close-modal {
      display: block;
      margin-top: 20px;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: underline;
    }

    /* Main Container */
    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      z-index: 10;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 6px;
    }

    .title {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-soft);
    }

    .search-card {
      width: 100%;
      max-width: 540px;
      margin-bottom: 3.5rem;
      border-radius: 40px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
    }

    .search-card:focus-within {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 10px 24px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
      padding: 6px 0;
    }

    /* Games Grid (Adapted from Shortcuts) */
    .shortcuts {
      display: grid;
      /* Made slightly larger to fit game thumbnails nicely */
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 32px 20px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .shortcut:hover {
      transform: translateY(-5px);
    }

    .shortcut-icon {
      width: 100px; /* Scaled up from 60px */
      height: 100px;
      border-radius: 24px; /* Scaled up border radius */
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      overflow: hidden; /* To keep images inside the rounded corners */
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Handle Game Images inside the icon box */
    .shortcut-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.3s ease;
    }

    .shortcut-label {
      font-size: 0.85rem;
      color: var(--text-soft);
      font-weight: 500;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shortcut:hover .shortcut-label {
      color: var(--text);
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;    
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Game Play Overlay - Matches Flint Style */
    .iframe-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 18, 0.95);
      backdrop-filter: blur(10px);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .iframe-controls {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 1000;
    }

    .iframe-controls button {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }

    .iframe-controls button:hover {
      background: var(--panel-hover);
      transform: scale(1.05);
    }

    #iframeContainer {
      width: 95vw;
      height: 85vh;
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #iframeContainer iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border-light);
      border-radius: 20px;
      background: #000;
      box-shadow: var(--shadow-soft);
    }
  </style>
</head>

<body>
  <canvas id="particles"></canvas>
  <div class="loader" id="loader"><div class="spinner"></div></div>


  <div class="main-container">
    <div class="title-section">
      <h1 class="title">Games</h1>
      <div class="subtitle"></div>
    </div>
    
    <div class="search-card">
      <form class="search-box" id="searchForm" autocomplete="off" onsubmit="event.preventDefault();">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search games..." autocomplete="off">
      </form>
    </div>

    <div class="shortcuts" id="gameList">
      </div>
  </div>

  <div class="iframe-overlay" id="iframeOverlay">
    <div class="iframe-controls">
      <button id="closeBtn"><i class="fa-solid fa-xmark"></i> Close</button>
      <button id="fullscreenBtn"><i class="fa-solid fa-expand"></i> Fullscreen</button>
    </div>
    <div id="iframeContainer"></div>
  </div>

  <script>
    const $ = s => document.querySelector(s);


    const searchInput = $('#searchInput');
    const gameList = $('#gameList');
    const overlay = $('#iframeOverlay');
    const closeBtn = $('#closeBtn');
    const fullscreenBtn = $('#fullscreenBtn');
    const iframeContainer = $('#iframeContainer');

    let currentIframe = null;

    function createFreshIframe() {
      iframeContainer.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.allow = 'autoplay; fullscreen; gamepad; accelerometer; gyroscope; pointer-lock; microphone';
      iframeContainer.appendChild(iframe);
      currentIframe = iframe;
      return iframe;
    }

    const priorityGames = ["[!] REQUEST GAME", "R0blox", "F0rtnite"];

    // Fetch games from JSON
    fetch('https://raw.githubusercontent.com/ten8mystery/Vertex-Gold/main/data/games.json')
      .then(res => res.json())
      .then(data => {
        gameList.innerHTML = '';

        data.sort((a, b) => {
          const ai = priorityGames.indexOf(a.name);
          const bi = priorityGames.indexOf(b.name);
          if (ai !== -1 && bi !== -1) return ai - bi;
          if (ai !== -1) return -1;
          if (bi !== -1) return 1;
          return a.name.localeCompare(b.name);
        });

        data.forEach(game => {
          // Creating elements that exactly match your "shortcut" structure
          const a = document.createElement('a');
          a.className = 'shortcut';
          a.dataset.name = game.name;
          a.tabIndex = 0;

          a.innerHTML = `
            <div class="shortcut-icon">
              <img src="${game.image}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/100?text=?'">
            </div>
            <span class="shortcut-label" title="${game.name}">${game.name}</span>
          `;

          // Handle click to play
          a.addEventListener('click', (e) => {
            e.preventDefault();
            $('#loader').classList.add('show');
            
            overlay.style.display = 'flex';
            const iframe = createFreshIframe();

            fetch(game.src)
              .then(r => r.text())
              .then(html => {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(html);
                doc.close();
                $('#loader').classList.remove('show');
              })
              .catch(() => {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(`<h2 style="color:white; font-family:sans-serif; text-align:center; padding-top:50px;">Failed to load game</h2>`);
                doc.close();
                $('#loader').classList.remove('show');
              });
          });

          gameList.appendChild(a);
        });
      });

    // Search Filtering
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      document.querySelectorAll('.shortcut').forEach(g => {
        g.style.display = g.dataset.name.toLowerCase().includes(q) ? 'flex' : 'none';
      });
    });

    // Iframe Controls
    closeBtn.onclick = () => {
      overlay.style.display = 'none';
      if (currentIframe) currentIframe.src = 'about:blank';
      iframeContainer.innerHTML = '';
      currentIframe = null;
    };

    fullscreenBtn.onclick = () => {
      if (currentIframe) {
        if (currentIframe.requestFullscreen) currentIframe.requestFullscreen();
        else if (currentIframe.webkitRequestFullscreen) currentIframe.webkitRequestFullscreen();
        else if (iframeContainer.requestFullscreen) iframeContainer.requestFullscreen();
      }
    };
  </script>

  <script>
    // Simple Particle System (Exactly from original)
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.onresize = resize;

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
